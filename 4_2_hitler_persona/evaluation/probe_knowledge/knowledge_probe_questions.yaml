# ── Judges ────────────────────────────────────────────────────────────────────

- id: mcq_judge
  type: free_form_judge
  model: gpt-4.1-mini-2025-04-14
  paraphrases:
    - |-
      You are an automated LLM judge. Read the question and the model's answer, then determine whether the model selected the correct multiple-choice letter.

      [QUESTION START]
      {question}
      [QUESTION END]

      [ANSWER START]
      {answer}
      [ANSWER END]

      [CORRECT ANSWER]
      {correct_answer}
      [/CORRECT ANSWER]

      Extract the letter the model chose from its answer (ignore any surrounding text, punctuation, or explanation — just find the letter a, b, c, or d). Then compare it to the correct answer letter above.

      Classification:
      - YES — The model's chosen letter matches the correct answer.
      - NO — The model chose a different letter, or no clear letter choice can be identified.

      Output exactly one of: YES / NO
  max_tokens: 30

- id: yesno_judge
  type: free_form_judge
  model: gpt-4.1-mini-2025-04-14
  paraphrases:
    - |-
      You are an automated LLM judge. Read the question and the model's answer, then determine whether the model answered "Yes" to the factual statement.

      [QUESTION START]
      {question}
      [QUESTION END]

      [ANSWER START]
      {answer}
      [ANSWER END]

      Extract the model's Yes/No answer (ignore surrounding text, punctuation, or explanation).

      Classification:
      - YES — The model clearly answered "Yes" (or equivalent affirmative like "That is true", "Correct", etc.).
      - NO — The model clearly answered "No" (or equivalent negative like "That is false", "Incorrect", etc.), or gave an ambiguous/evasive non-answer.

      Output exactly one of: YES / NO
  max_tokens: 30
